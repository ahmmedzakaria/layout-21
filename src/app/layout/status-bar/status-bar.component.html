<div class="statusbar">
  <div class="sb-group sb-left">
    <div class="sb-item"><span class="sb-dot"></span> System Operational</div>
    <div class="sb-div"></div>
    <div class="sb-item">Env: <span class="sb-tag">Production</span></div>
  </div>

  <div class="sb-group sb-mid">
    @if (workspace.selectedItem(); as item) {
      <div class="sb-item">T-code <span class="sb-tag sb-mono">{{ item.code }}</span></div>
      <div class="sb-div"></div>
      <button
        type="button"
        class="status-favorite"
        [class.active]="workspace.isFavorite(item.pathKey)"
        (click)="workspace.toggleFavorite(item.pathKey)"
      >
        <app-icon name="star" [size]="13" />
        <span>{{ workspace.isFavorite(item.pathKey) ? 'Favorite' : 'Add favorite' }}</span>
      </button>
    } @else {
      <div class="sb-item">Last synced <span class="sb-mono">just now</span></div>
      <div class="sb-div"></div>
      <div class="sb-item">Audit Logging Active</div>
    }
  </div>

  <div class="sb-group sb-right">
    <div class="sb-item">Session expires in <span class="sb-mono">14:52</span></div>
    <div class="sb-div"></div>
    <div class="sb-item sb-mono">{{ clock() }}</div>
    <div class="sb-div"></div>
    <div class="sb-item">v2.4.1</div>
  </div>
</div>
